name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - "db/**"
      - "scripts/apply-d1-migrations.mjs"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      database:
        description: "D1 database name from wrangler.toml"
        required: false
        default: "hatch"
      wrangler_env:
        description: "Optional Wrangler environment (for example: staging)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      D1_DATABASE: ${{ github.event.inputs.database || 'hatch' }}
      WRANGLER_ENV: ${{ github.event.inputs.wrangler_env || '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: |
          args=(scripts/apply-d1-migrations.mjs --database "$D1_DATABASE" --remote)
          if [ -n "$WRANGLER_ENV" ]; then
            args+=(--env "$WRANGLER_ENV")
          fi
          node "${args[@]}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
