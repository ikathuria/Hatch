name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'db/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Deploy D1 Schema
        run: npx wrangler d1 execute hatch --remote --file=db/schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check if org columns exist
        id: org_cols
        run: |
          schema=$(npx wrangler d1 execute hatch --remote --command "PRAGMA table_info('events');")
          missing=0
          for col in organization_name website_url twitter_url discord_url max_participants; do
            if ! echo "$schema" | grep -q "$col"; then
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            present=true
          else
            present=false
          fi
          echo "present=$present" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy D1 migration (org columns)
        if: steps.org_cols.outputs.present != 'true'
        run: npx wrangler d1 execute hatch --remote --file=db/migrations/01_add_org_social.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check if banner_url column exists
        id: banner_url_col
        run: |
          schema=$(npx wrangler d1 execute hatch --remote --command "PRAGMA table_info('events');")
          if echo "$schema" | grep -q "banner_url"; then
            present=true
          else
            present=false
          fi
          echo "present=$present" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy D1 migration (banner URL)
        if: steps.banner_url_col.outputs.present != 'true'
        run: npx wrangler d1 execute hatch --remote --file=db/migrations/02_banner_url.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}