name: Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'db/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Deploy D1 Schema
        run: npx wrangler d1 execute hatch --remote --file=db/schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check if org columns exist
        id: org_cols
        run: |
          json=$(npx wrangler d1 execute hatch --remote \
            --command "SELECT count(*) AS c FROM pragma_table_info('events') WHERE name IN ('organization_name','website_url','twitter_url','discord_url','max_participants');" \
            --json)
          present=$(node -e "const j=JSON.parse(process.argv[1]); const rows=Array.isArray(j.results)?j.results:[]; const c=rows[0]?.c ?? 0; process.stdout.write(Number(c) >= 5 ? 'true' : 'false')" "$json")
          echo "present=$present" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy D1 migration (org columns)
        if: steps.org_cols.outputs.present != 'true'
        run: npx wrangler d1 execute hatch --remote --file=db/migrations/01_add_org_social.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check if banner_url column exists
        id: banner_url_col
        run: |
          json=$(npx wrangler d1 execute hatch --remote \
            --command "SELECT count(*) AS c FROM pragma_table_info('events') WHERE name='banner_url';" \
            --json)
          present=$(node -e "const j=JSON.parse(process.argv[1]); const rows=Array.isArray(j.results)?j.results:[]; const c=rows[0]?.c ?? 0; process.stdout.write(Number(c) >= 1 ? 'true' : 'false')" "$json")
          echo "present=$present" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy D1 migration (banner URL)
        if: steps.banner_url_col.outputs.present != 'true'
        run: npx wrangler d1 execute hatch --remote --file=db/migrations/02_banner_url.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}